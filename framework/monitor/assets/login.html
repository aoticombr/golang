<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Monitor — Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-bg">
  <form class="login-card" method="post" action="/login">
    <div class="logo">
      <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3-9 4 18 3-9h4"/></svg>
    </div>
    <h1>Monitor</h1>
    <p class="subtitle">Acesso restrito</p>
    <label>Usuário<input name="user" autocomplete="username" autofocus required></label>
    <label>Senha<input name="pass" type="password" autocomplete="current-password" required></label>
    <button type="submit">Entrar</button>
  </form>
</body>
</html>
